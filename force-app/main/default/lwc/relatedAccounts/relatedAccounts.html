<template>
    <lightning-card title="Related Customers" icon-name="standard:account">
        <div class="slds-p-horizontal_small">
            <template lwc:if={hasAccounts}>
                <lightning-datatable
                    key-field="accountId"
                    data={accounts}
                    columns={columns}
                    hide-checkbox-column
                    show-row-number-column={false}
                ></lightning-datatable>
            </template>
            <template lwc:else>
                <p class="slds-text-body_small slds-text-color_weak">
                    No related accounts.
                </p>
            </template>
        </div>
    </lightning-card>
</template>
