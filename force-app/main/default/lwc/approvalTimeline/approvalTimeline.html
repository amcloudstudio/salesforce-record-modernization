<template>
    <lightning-card title="Approval Timeline" icon-name="standard:approval">
        <div class="slds-p-horizontal_small">
            <template lwc:if={hasSteps}>
                <ul class="slds-timeline">
                    <template for:each={formattedSteps} for:item="step">
                        <li key={step.stepId} class="slds-timeline__item_expandable slds-timeline__item_icon">
                            <div class="slds-timeline__item-detail">
                                <div class="slds-media">
                                    <div class="slds-media__figure">
                                        <lightning-icon
                                            icon-name={step.iconName}
                                            size="small"
                                        ></lightning-icon>
                                    </div>
                                    <div class="slds-media__body">
                                        <div class="slds-grid slds-grid_align-spread">
                                            <span>
                                                Step {step.stepOrder}: {step.approverName}
                                            </span>
                                            <span class={step.badgeClass}>{step.status}</span>
                                        </div>
                                        <template lwc:if={step.completedDate}>
                                            <p class="slds-text-body_small slds-text-color_weak">
                                                Completed {step.completedDate}
                                            </p>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </li>
                    </template>
                </ul>
            </template>
            <template lwc:else>
                <p class="slds-text-body_small slds-text-color_weak">
                    No approval steps defined for this engagement.
                </p>
            </template>
        </div>
    </lightning-card>
</template>
